packages:
  - 'apps/*'
  - 'packages/*'
  - 'packages/config/*'

catalog:
  # 19.2.3 = the Expo SDK 56 / RN 0.85.3 matrix version (the native renderer
  # requires an exact match). NOTE: web (Next) wanted 19.2.7 for the May-2026
  # Next/react-dom SSR security fix — revisit react/react-dom when the web app
  # is actually built (see ENGINEERING_LOG 2026-06-20).
  react: 19.2.3
  react-dom: 19.2.3
  typescript: 5.9.3
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  '@types/node': ^25.9.3
  '@tanstack/react-query': 5.101.0
  '@tanstack/react-query-devtools': 5.101.0
  jotai: 2.20.1
  jotai-tanstack-query: 0.11.0
  valibot: 1.4.1
  react-hook-form: 7.78.0
  '@hookform/resolvers': 5.4.0
  clsx: 2.1.1
  tailwind-merge: 3.6.0
  class-variance-authority: 0.7.1
